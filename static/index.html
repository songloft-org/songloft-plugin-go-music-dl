<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Go Music DL</title>
    <link rel="icon" type="image/svg+xml" href="static/icon.svg">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="static/css/style.css">
    <style>
        .song-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--md-outline-variant, #e0e0e0); }
        .song-cover { width: 44px; height: 44px; border-radius: 8px; object-fit: cover; flex: 0 0 auto; }
        .song-meta { flex: 1; min-width: 0; }
        .song-title { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .song-sub { font-size: 12px; color: var(--md-on-surface-variant, #666); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .song-actions { display: flex; gap: 8px; flex: 0 0 auto; }
        .song-status { display: inline-block; margin-top: 4px; font-size: 11px; padding: 1px 8px; border-radius: 999px; line-height: 1.6; }
        .song-status.status-pending { background: rgba(0,0,0,.06); color: #888; }
        .song-status.status-checking { background: rgba(99,102,241,.12); color: #5b5fc7; }
        .song-status.status-ok { background: rgba(76,175,80,.15); color: #2e7d32; }
        .song-status.status-fail { background: rgba(229,57,53,.14); color: #c62828; }
        .song-row.song-dead .song-title { color: #999; }
        .btn-text:disabled { opacity: .38; cursor: not-allowed; }
        .source-box { display: flex; flex-wrap: wrap; gap: 12px 18px; margin-top: 8px; }
        .text-field, .select-field { width: 100%; }
        .playlist-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(108px, 1fr)); gap: 14px; padding-top: 4px; }
        .playlist-grid > .empty-state, .playlist-grid > .mylist-login-hint { grid-column: 1 / -1; }
        .playlist-card { display: flex; flex-direction: column; background: var(--md-surface, #fff); border: 1px solid var(--md-outline-variant, #e0e0e0); border-radius: 14px; overflow: hidden; cursor: pointer; transition: transform .15s ease, box-shadow .15s ease; }
        .playlist-card:active { background: rgba(99,102,241,.06); }
        .playlist-cover { position: relative; width: 100%; aspect-ratio: 1 / 1; background: var(--md-surface-variant, #eee); overflow: hidden; }
        .playlist-cover img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .playlist-source-tag { position: absolute; top: 6px; right: 6px; font-size: 10px; line-height: 1; padding: 3px 6px; border-radius: 999px; background: rgba(0,0,0,.55); color: #fff; -webkit-backdrop-filter: blur(2px); backdrop-filter: blur(2px); }
        .playlist-meta { padding: 8px 10px 10px; min-width: 0; }
        .playlist-title { font-size: 13px; font-weight: 600; color: var(--md-on-surface, #1f1f1f); display: -webkit-box; -webkit-line-clamp: 2; line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .playlist-sub { font-size: 11px; color: var(--md-on-surface-variant, #666); margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .mylist-login-hint { font-size: 12px; color: var(--md-on-surface-variant, #666); }
        .mylist-cats { display: flex; gap: 8px; overflow-x: auto; padding: 2px 0 10px; -webkit-overflow-scrolling: touch; }
        .mylist-cat { flex: 0 0 auto; font-size: 13px; padding: 6px 14px; border-radius: 999px; border: 1px solid var(--md-outline-variant, #e0e0e0); background: transparent; color: var(--md-on-surface, #333); cursor: pointer; white-space: nowrap; }
        .mylist-cat.active { background: var(--md-primary, #5b5fc7); border-color: var(--md-primary, #5b5fc7); color: #fff; }
    </style>
</head>
<body>
    <header class="app-bar">
        <h1>Go Music DL</h1>
        <button class="btn-icon" id="refreshBtn" title="刷新">刷新</button>
    </header>

    <div class="tab-content active" id="tab-browser">
        <div class="container">
            <div class="card">
                <div class="card-body" style="display:flex;flex-direction:column;gap:12px;">
                    <div style="display:flex;gap:8px;align-items:center;">
                        <input type="text" class="text-field" id="searchInput" placeholder="搜索歌手、歌曲..." style="flex:1">
                        <button class="btn-filled" id="searchBtn" style="padding:0 16px;">搜索</button>
                    </div>
                </div>
            </div>

            <div class="card" id="recommendCard" style="margin-top:16px;">
                <div class="card-header" style="display:flex;align-items:center;justify-content:space-between;">
                    <span>每日推荐歌单</span>
                    <button class="btn-text" id="refreshRecommendBtn">刷新</button>
                </div>
                <div class="card-body">
                    <div class="mylist-cats" id="recommendCats"></div>
                    <div id="recommendList" class="playlist-grid" style="padding-top:0">
                        <div class="empty-state">加载中…</div>
                    </div>
                </div>
            </div>

            <div class="card" id="listCard" style="margin-top:16px; display:none;">
                <div class="card-header">搜索结果</div>
                <div class="card-body" id="browserList" style="padding-top:0">
                    <div class="empty-state">请输入关键词搜索歌曲</div>
                </div>
            </div>
        </div>
    </div>

    <div class="tab-content" id="tab-mylist">
        <div class="container">
            <div id="myPlaylistView">
                <div class="card">
                    <div class="card-header" style="display:flex;align-items:center;justify-content:space-between;">
                        <span>我的歌单</span>
                        <button class="btn-text" id="refreshMyListBtn">刷新</button>
                    </div>
                    <div class="card-body">
                        <div class="card-desc" style="margin-bottom:10px;">显示已登录平台中你创建和收藏的歌单。点击下方分类可只看对应平台的歌单。</div>
                        <div class="mylist-cats" id="myPlaylistCats"></div>
                        <div id="myPlaylistList" class="playlist-grid"><div class="empty-state">点击「刷新」加载歌单</div></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 歌单歌曲详情：全屏浮层，独立于 tab，从搜索页（推荐）或我的歌单页点击均可正常显示 -->
    <div id="mySongsView" style="display:none; position:fixed; inset:0; background:var(--md-surface,#fff); z-index:110; overflow-y:auto;">
        <header class="songs-overlay-bar">
            <button class="songs-back-btn" id="backToPlaylistsBtn">← 返回</button>
            <h1 id="mySongsTitle">歌单歌曲</h1>
        </header>
        <div class="container" style="padding-bottom:150px;">
            <div class="card" style="margin-top:12px;">
                <div class="card-body" id="mySongsList"><div class="empty-state">加载中…</div></div>
            </div>
        </div>
    </div>

    <div class="tab-content" id="tab-config">
        <div class="container">
            <div class="card">
                <div class="card-header">基础设置</div>
                <div class="card-body">
                    <div class="form-group">
                        <label class="form-label">go-music-dl 服务地址</label>
                        <input type="text" class="text-field" id="configBaseUrl" placeholder="http://127.0.0.1:58091">
                        <div class="card-desc" style="padding:0;margin-top:4px;">填根地址即可，例如 http://你的服务器地址:8080（插件会自动补 /music）</div>
                        <div class="toolbar" style="padding:12px 0 0;justify-content:flex-end;gap:8px; background:transparent; border-bottom:none;">
                            <button class="btn-filled" id="saveConfigBtn">保存配置</button>
                        </div>
                    </div>
                    <div class="form-group" style="margin-top:16px;">
                        <div style="display:flex; align-items:center; justify-content:space-between; gap:8px;">
                            <label class="form-label" style="margin:0;">搜索音源</label>
                            <div style="display:flex; gap:8px;">
                                <button type="button" class="btn-text" id="selectAllSourcesBtn">全选</button>
                                <button type="button" class="btn-text" id="clearAllSourcesBtn">清空</button>
                            </div>
                        </div>
                        <div class="source-box" id="configSources"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <nav class="tab-bar">
        <button class="tab-item active" data-tab="browser"><span>搜索</span></button>
        <button class="tab-item" data-tab="mylist"><span>我的歌单</span></button>
        <button class="tab-item" data-tab="config"><span>插件设置</span></button>
    </nav>

    <div id="snackbar" class="snackbar"></div>

    <!-- 真实在插件内播放的音频元素 -->
    <audio id="audio" preload="none"></audio>

    <!-- 底部迷你播放条：常驻显示，点歌曲即播放；点此条展开全屏播放器 -->
    <div class="gmd-miniplayer" id="playerBar">
        <div class="gmd-pb-click" onclick="openFullscreenPlayer()">
            <img class="gmd-pb-cover" id="pbCover" alt="Go Music DL" src="static/icon.svg" referrerpolicy="no-referrer">
            <div class="gmd-pb-meta">
                <div class="gmd-pb-title" id="pbTitle">暂无播放</div>
                <div class="gmd-pb-artist" id="pbArtist">-</div>
            </div>
        </div>
        <button class="btn-icon" id="pbPlayBtn" title="播放/暂停">
            <span class="material-symbols-outlined">play_arrow</span>
        </button>
        <div class="progress-bar-container">
            <span class="progress-time" id="pbCurrent">0:00</span>
            <div class="progress-track" id="pbTrack">
                <div class="progress-fill" id="pbFill"></div>
                <div class="progress-thumb" id="pbThumb"></div>
            </div>
            <span class="progress-time" id="pbTotal">0:00</span>
        </div>
        <button class="btn-icon" id="pbStopBtn" title="停止">
            <span class="material-symbols-outlined">stop_circle</span>
        </button>
    </div>

    <!-- 全屏播放器 -->
    <div class="fullscreen-player" id="fullscreenPlayer" role="dialog" aria-modal="true">
        <div class="fp-bg-image" id="fpBgImage"></div>
        <div class="fp-bg-overlay"></div>
        <div class="fp-content">
            <div class="fp-topbar">
                <button class="btn-icon fp-close-btn" onclick="closeFullscreenPlayer()">
                    <span class="material-symbols-outlined">keyboard_arrow_down</span>
                </button>
                <span class="fp-topbar-title">正在播放</span>
                <button class="btn-icon fp-close-btn" id="fpLyricToggle" title="歌词">
                    <span class="material-symbols-outlined">lyrics</span>
                </button>
            </div>
            <div class="fp-main">
                <div class="fp-pages" id="fpPages">
                    <div class="fp-page fp-cover-page">
                        <div class="fp-cover-wrap" id="fpCoverWrap">
                            <img class="fp-cover-img" id="fpCoverImg" alt="封面" referrerpolicy="no-referrer">
                            <span class="material-symbols-outlined fp-cover-placeholder" id="fpCoverPlaceholder">music_note</span>
                        </div>
                    </div>
                    <div class="fp-page fp-lyrics-page">
                        <div class="fp-lyrics-container" id="fpLyricsContainer">
                            <div class="fp-lyrics-empty">暂无歌词</div>
                        </div>
                    </div>
                </div>
                <div class="fp-page-indicator" id="fpPageIndicator">
                    <span class="fp-dot active"></span>
                    <span class="fp-dot"></span>
                </div>
            </div>
            <div class="fp-song-info">
                <div class="fp-song-title" id="fpSongTitle">暂无播放</div>
                <div class="fp-song-artist" id="fpSongArtist">-</div>
            </div>
            <div class="fp-progress">
                <span class="fp-time" id="fpCurrentTime">0:00</span>
                <div class="progress-track" id="fpProgressTrack">
                    <div class="progress-fill" id="fpProgressFill"></div>
                    <div class="progress-thumb" id="fpProgressThumb"></div>
                </div>
                <span class="fp-time" id="fpTotalTime">0:00</span>
            </div>
            <div class="fp-controls">
                <button class="btn-icon" id="fpPrevBtn" title="上一首">
                    <span class="material-symbols-outlined">skip_previous</span>
                </button>
                <button class="btn-icon fp-play-btn" id="fpPlayBtn" title="播放/暂停">
                    <span class="material-symbols-outlined">play_arrow</span>
                </button>
                <button class="btn-icon" id="fpNextBtn" title="下一首">
                    <span class="material-symbols-outlined">skip_next</span>
                </button>
            </div>
        </div>
    </div>

    <script type="module" src="static/js/app.js"></script>
</body>
</html>
